<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKKi — Bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080a;
    --panel: rgba(20,16,18,0.72);
    --panel-solid:#141014;
    --line: rgba(255,90,60,0.18);
    --red:#c00d1e;
    --red-bright:#ff2436;
    --ember:#ff5a1f;
    --cyan:#ff5a1f; /* keeping single accent family instead of reference's cyan */
    --text:#f2ece9;
    --text-dim:#9a9095;
    --online:#3ddc84;
    --display:'Orbitron', sans-serif;
    --mono:'Share Tech Mono', monospace;
    --body:'Inter', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:var(--body);
    color:var(--text);
    background:var(--bg);
    position:relative;
    overflow-x:hidden;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }

  /* Background scene - built from CSS, not a photo, to keep it original */
  .scene{
    position:fixed; inset:0; z-index:0; overflow:hidden;
  }
  .scene::before{
    content:'';
    position:absolute; inset:-10%;
    background:
      radial-gradient(ellipse 60% 45% at 22% 30%, rgba(192,13,30,0.28), transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 75%, rgba(255,90,31,0.18), transparent 60%),
      radial-gradient(ellipse 70% 60% at 50% 100%, rgba(120,10,20,0.25), transparent 70%);
    filter: blur(20px);
  }
  .scene .grid{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,90,60,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,90,60,0.06) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 75%);
  }
  .scene .noise{
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, transparent 1px, transparent 2px);
    mix-blend-mode:overlay;
  }
  .scene .beam{
    position:absolute; top:-20%; left:50%; width:2px; height:140%;
    background:linear-gradient(180deg, transparent, rgba(255,90,31,0.5), transparent);
    transform:translateX(-50%) rotate(8deg);
    filter:blur(1px);
    opacity:0.5;
  }

  .stack{
    position:relative; z-index:2;
    width:100%; max-width:380px;
    display:flex; flex-direction:column; gap:14px;
  }

  /* CARD */
  .card{
    background:var(--panel);
    backdrop-filter:blur(18px);
    border:1px solid var(--line);
    border-radius:16px;
    padding:34px 28px 26px;
    text-align:center;
    position:relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .card-controls{
    position:absolute; top:18px; left:18px; right:18px;
    display:flex; justify-content:space-between;
  }
  .icon-btn{
    width:34px; height:34px; border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); cursor:pointer;
    transition:all .2s;
  }
  .icon-btn:hover{ color:var(--ember); border-color:var(--ember); }
  .icon-btn svg{width:15px; height:15px;}

  .avatar-ring{
    width:104px; height:104px; margin:6px auto 18px;
    border-radius:50%;
    padding:3px;
    background:conic-gradient(var(--red-bright), var(--ember), var(--red-bright));
    box-shadow:0 0 26px rgba(255,90,31,0.45);
  }
  .avatar{
    width:100%; height:100%; border-radius:50%;
    background:var(--panel-solid);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--display); font-weight:900; font-size:34px;
    color:var(--ember);
    border:2px solid var(--bg);
  }

  .name{
    font-family:var(--display); font-weight:900; font-size:30px;
    letter-spacing:1px; text-transform:uppercase;
    background:linear-gradient(90deg, var(--red-bright), var(--ember));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .role{ margin-top:8px; font-size:14px; color:var(--text-dim); }
  .role.b{ margin-top:2px; font-weight:600; color:var(--text); font-size:13.5px; }

  /* MINI STATUS WIDGET */
  .status-widget{
    margin-top:20px;
    background:rgba(0,0,0,0.35);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    display:flex; align-items:center; gap:12px;
    text-align:left;
  }
  .status-widget .sw-avatar{
    width:38px; height:38px; border-radius:50%;
    background:var(--panel-solid);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--display); font-weight:700; font-size:14px; color:var(--ember);
    position:relative; flex-shrink:0;
  }
  .status-dot{
    position:absolute; bottom:-1px; right:-1px;
    width:11px; height:11px; border-radius:50%;
    background:var(--online); border:2px solid var(--panel-solid);
  }
  .sw-info{flex:1;}
  .sw-info .sw-name{font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:6px;}
  .sw-info .sw-meta{font-size:11.5px; color:var(--text-dim); font-family:var(--mono); line-height:1.5; margin-top:2px;}
  .sw-link{
    width:30px; height:30px; border-radius:50%;
    background:var(--red); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
  }
  .sw-link svg{width:14px; height:14px;}

  /* SOCIAL ROW */
  .social-row{
    display:flex; justify-content:center; gap:16px;
    margin-top:20px;
  }
  .social-row a{
    color:var(--text-dim); transition:color .2s, transform .2s;
  }
  .social-row a:hover{ color:var(--ember); transform:translateY(-2px); }
  .social-row svg{width:19px; height:19px;}

  /* LINK BUTTONS */
  .linkbtn{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel);
    backdrop-filter:blur(18px);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 20px;
    font-family:var(--body); font-weight:600; font-size:14.5px;
    transition:border-color .2s, background .2s, transform .15s;
  }
  .linkbtn:hover{ border-color:var(--ember); transform:translateY(-2px); background:rgba(255,90,31,0.06); }
  .linkbtn .left{display:flex; align-items:center; gap:12px;}
  .linkbtn svg.ico{width:17px; height:17px; color:var(--ember);}
  .linkbtn svg.arrow{width:15px; height:15px; color:var(--text-dim); transition:transform .2s;}
  .linkbtn:hover svg.arrow{ transform:translateX(3px); color:var(--ember); }

  .duo{display:flex; gap:12px;}
  .duo .linkbtn{flex:1; font-size:13.5px; padding:15px 16px;}

  footer{
    margin-top:6px; text-align:center; font-family:var(--mono);
    font-size:11px; color:var(--text-dim); letter-spacing:1px;
  }
</style>
</head>
